    <div class="addcourse">
        <h1>What course do you want to add?</h1>
    </div>
    <div class="addcourse">
        <div class="form">
            <h2>Choose course:</h2>
            <form>
               <input id="english" type="radio" value="english" name="course">
               <label for="english">English</label>
               <br>
               <input id="C Language" type="radio" value="C Language" name="course">
               <label for="C Language">C Language</label>
               <br>
               <input id="Python" type="radio" value="Python" name="course">
               <label for="Python">Python</label>
               <br>
               <button type="send">send</button>
            
           </form>
        </div>
        <div class="note">
            <h1>Please,Write your notes:</h1>
        </div>
        <div class="note">
            <form>
                <textarea name="note" placeholder="Write your notes" row="5"></textarea>
                <button type="send">Send</button>
            </form>
        </div>
    </div>
    <footer>
        <p>@ 2026 personal Course Organizer</p>
    </footer>
    
</body>
